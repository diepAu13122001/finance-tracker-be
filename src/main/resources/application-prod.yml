# Đọc từ environment variables — không hardcode giá trị thật
spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

server:
  port: ${PORT:8081}

app:
  jwt:
    secret: ${APP_JWT_SECRET}
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost}

logging:
  level:
    root: WARN
    com.diepau1312: INFO