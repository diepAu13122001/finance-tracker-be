# application.yml — thêm default values để tránh null khi chạy local
spring:
  application:
    name: finance-tracker

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finance_tracker}
    username: ${SPRING_DATASOURCE_USERNAME:ft_user}
    password: ${SPRING_DATASOURCE_PASSWORD:ft_password}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true

  cache:
    type: simple

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${APP_JWT_SECRET:8d90d5d6-be52-478a-8037-9c2bab86f0cd}
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
  cors:
    allowed-origins: ${APP_CORS_ORIGINS:http://localhost:5173,http://localhost:3000}