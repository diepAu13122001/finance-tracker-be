spring:
  config:
    import: optional:application-local.yml
  application:
    name: finance-tracker

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
#    baseline-version: 1
#    # Nói với Flyway: "coi như V1 đã chạy rồi, bắt đầu từ V2"

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: ${PORT:8081}

app:
  jwt:
    expiration-ms: 900000
    refresh-expiration-ms: 604800000

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
