spring:
  config:
    import: optional:application-local.yml
  application:
    name: finance-tracker

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

server:
  port: 8081

app:
  jwt:
    expiration-ms: 900000
    refresh-expiration-ms: 604800000