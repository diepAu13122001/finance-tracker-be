spring:
  application:
    name: finance-tracker

  datasource:
    url: jdbc:postgresql://localhost:5432/finance_tracker
    username: ft_user
    password: ft_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
      # validate = JPA kiểm tra schema khớp với entity nhưng KHÔNG tự sửa
      # Flyway sẽ lo việc tạo/sửa bảng — JPA chỉ đọc
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8081

app:
  jwt:
    secret: your-super-secret-key-must-be-at-least-256-bits-long-for-hs256
    expiration-ms: 900000       # 15 phút = access token
    refresh-expiration-ms: 604800000  # 7 ngày = refresh token