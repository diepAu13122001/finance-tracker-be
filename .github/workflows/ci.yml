name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Backend Tests ────────────────────────────────────────────────────────────
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      # Tạo PostgreSQL tạm thời để chạy integration test
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: finance_tracker_test
          POSTGRES_USER: ft_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/finance_tracker_test
          SPRING_DATASOURCE_USERNAME: ft_user
          SPRING_DATASOURCE_PASSWORD: test_password
          APP_JWT_SECRET: test-secret-key-for-ci-minimum-32-chars
          SPRING_PROFILES_ACTIVE: local
        run: ./mvnw test -B

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() # upload kể cả khi test fail
        with:
          name: test-results
          path: target/surefire-reports/

  # ── Backend Build ────────────────────────────────────────────────────────────
  backend-build:
    name: Backend Docker Build
    runs-on: ubuntu-latest
    needs: backend-test # chỉ build nếu test pass

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t finance-tracker-be .

      - name: Verify image runs
        run: |
          docker run -d \
            -e SPRING_DATASOURCE_URL=jdbc:postgresql://localhost/test \
            -e APP_JWT_SECRET=test-secret-32-chars-minimum-here \
            --name test-container \
            finance-tracker-be || true
          sleep 5
          docker rm -f test-container || true
